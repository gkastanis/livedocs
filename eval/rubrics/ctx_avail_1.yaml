  case_sensitive: false
  values:
  - UniqueConstraintValidator
  - ::validate
  - validator
  metadata:
    discriminator: false
- id: lookup_method
  kind: must_contain_any
  case_sensitive: false
  values:
  - getByUserAndSessionPeriod
  metadata:
    discriminator: false
- id: links_to_existing
  kind: must_contain_any
  case_sensitive: false
  values:
  - link
  - existing
  metadata:
    discriminator: false
scoring:
  combine: weighted_avg
  weights:
    constraint_mechanism: 2.0
    validator: 1.0
    lookup_method: 1.0
    links_to_existing: 1.0
