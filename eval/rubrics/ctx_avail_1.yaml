# yaml-language-server: $schema=https://git.drupalcode.org/project/ai_eval/-/raw/1.0.x/schema/rubric.schema.json
id: ctx_avail_1
version: '1.0'
description: Context-completeness for change task avail_1
applicable_bundles:
- code_navigation
checks:
